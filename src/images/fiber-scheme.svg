    <circle cx="490" cy="385" r="12"/>
    <circle cx="770" cy="255" r="11"/>
    <circle cx="1090" cy="120" r="14"/>
    <circle cx="150" cy="210" r="10"/>
    <circle cx="560" cy="315" r="12"/>
    <circle cx="1040" cy="525" r="14"/>
    <circle cx="170" cy="430" r="10"/>
    <circle cx="650" cy="425" r="12"/>
    <circle cx="1120" cy="610" r="14"/>
  </g>
</svg>
